<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Login</title>
  <style>
    body{ margin:0; height:100vh; display:flex; justify-content:center; align-items:center; background:#f5f5f5; font-family:Arial,sans-serif; }
    .card{ background:#fff; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,.1); text-align:center; width:300px; }
    button{ width:100%; padding:14px; border:none; border-radius:10px; background:#4285F4; color:#fff; font-size:16px; cursor:pointer; transition: all 0.3s ease; }
    button:hover { background:#357ae8; }
    button:disabled { background:#ccc; cursor: not-allowed; }
    .error { color: #d32f2f; margin-top: 10px; font-size: 14px; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Google Login</h2>
    <button id="loginBtn">Login with Google</button>
    <div id="error" class="error"></div>
  </div>

  <script type="module">
    // Version 10.12.2 kiya gaya hai
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCqSMjr5__HNV-LXZi5vQvGzfBQ46lRFNA",
      authDomain: "auth-demo-f8ae4.firebaseapp.com",
      projectId: "auth-demo-f8ae4",
      storageBucket: "auth-demo-f8ae4.firebasestorage.app",
      messagingSenderId: "245702722359",
      appId: "1:245702722359:web:c669123eb90a1d282290b2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById("loginBtn");
    const errorDiv = document.getElementById("error");

    // Agar user pehle se login hai, sidha dashboard bhejo
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.replace("dashboard.html");
      }
    });

    // Login logic
    loginBtn.addEventListener("click", async () => {
      try {
        errorDiv.textContent = "";
        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";
        
        await signInWithPopup(auth, provider);
        // Login successful hone par onAuthStateChanged khud dashboard par bhej dega
      } catch (error) {
        console.error("Login error:", error);
        errorDiv.textContent = "Error: " + error.message;
        loginBtn.disabled = false;
        loginBtn.textContent = "Login with Google";
      }
    });
  </script>
</body>
</html>
