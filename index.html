<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
    <div class="text-center mb-6">
        <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white text-3xl font-bold mx-auto mb-4 shadow-md">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800" id="formTitle">Welcome Back</h1>
        <p class="text-sm text-gray-500 mt-1" id="formSubtitle">Please enter your details to sign in</p>
    </div>
    
    <form id="authForm" class="space-y-4" onsubmit="return false;">
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Email Address</label>
            <input type="email" id="email" required placeholder="name@school.com" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 transition">
        </div>
        
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
            <input type="password" id="password" required placeholder="••••••••" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 transition">
        </div>

        <p id="errorMsg" class="text-red-500 text-sm hidden font-bold text-center bg-red-50 p-2 rounded-lg border border-red-100"></p>

        <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 shadow-md transition">
            Sign In
        </button>
    </form>

    <div class="mt-4 text-center">
        <button id="toggleModeBtn" class="text-sm font-bold text-blue-600 hover:underline">Don't have an account? Create one</button>
    </div>

    <div class="relative flex items-center justify-center w-full mt-6 mb-6">
        <div class="absolute w-full border-t border-gray-200"></div>
        <span class="bg-white px-3 text-xs text-gray-400 font-bold uppercase relative z-10">OR</span>
    </div>

    <button id="googleBtn" class="w-full bg-white border border-gray-200 text-gray-700 font-bold py-3.5 rounded-xl hover:bg-gray-50 shadow-sm transition flex justify-center items-center gap-3">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
        Continue with Google
    </button>
</div>

<script type="module">
    import { auth, db } from './js/firebase-init.js';
    import { signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
    import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const authForm = document.getElementById('authForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const toggleModeBtn = document.getElementById('toggleModeBtn');
    const googleBtn = document.getElementById('googleBtn');
    const formTitle = document.getElementById('formTitle');
    const formSubtitle = document.getElementById('formSubtitle');

    let isLoginMode = true;
    let isProcessingAction = false;

    // Toggle Mode
    toggleModeBtn.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        if (isLoginMode) {
            formTitle.innerText = "Welcome Back";
            formSubtitle.innerText = "Please enter your details to sign in";
            submitBtn.innerText = "Sign In";
            toggleModeBtn.innerText = "Don't have an account? Create one";
        } else {
            formTitle.innerText = "Create Account";
            formSubtitle.innerText = "Sign up to access the portal";
            submitBtn.innerText = "Sign Up";
            toggleModeBtn.innerText = "Already have an account? Sign In";
        }
    });

    // Auto-Login Check
    onAuthStateChanged(auth, async (user) => {
        if (user && !isProcessingAction) {
            submitBtn.innerHTML = 'Redirecting...';
            checkRoleAndRedirect(user);
        }
    });

    // Email/Password Sign In / Sign Up
    authForm.addEventListener('submit', async () => {
        isProcessingAction = true;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        submitBtn.innerHTML = 'Processing...';
        submitBtn.disabled = true;
        errorMsg.classList.add('hidden');

        try {
            let userCredential;
            if (isLoginMode) {
                userCredential = await signInWithEmailAndPassword(auth, email, password);
                await checkRoleAndRedirect(userCredential.user);
            } else {
                userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    email: email,
                    role: "student",
                    createdAt: serverTimestamp()
                });
                await checkRoleAndRedirect(userCredential.user);
            }
        } catch (error) {
            showError(error.message);
        }
    });

    // Google Sign In
    googleBtn.addEventListener('click', async () => {
        isProcessingAction = true;
        const provider = new GoogleAuthProvider();
        try {
            const result = await signInWithPopup(auth, provider);
            await checkRoleAndRedirect(result.user);
        } catch (error) {
            showError(error.message);
        }
    });

    // Smart Redirect Function (Database record missing hone par automatic bana dega)
    async function checkRoleAndRedirect(user) {
        try {
            const docRef = doc(db, "users", user.uid);
            let docSnap = await getDoc(docRef);

            // AGAR DATABASE EMPTY HAI YA RECORD DELETE HO GAYA HAI, TO APNE AAP RECREATE KARO
            if (!docSnap.exists()) {
                await setDoc(docRef, {
                    name: user.displayName || "Student",
                    email: user.email,
                    role: "student", // Pehle default student banega
                    createdAt: serverTimestamp()
                });
                docSnap = await getDoc(docRef); // Refresh data
            }

            const userData = docSnap.data();
            if (userData.role === "admin") {
                window.location.href = "admin/admin.html";
            } else {
                window.location.href = "student/dashboard.html";
            }
        } catch (err) {
            showError(err.message);
        }
    }

    function showError(msg) {
        errorMsg.innerText = msg.replace("Firebase: ", "");
        errorMsg.classList.remove('hidden');
        submitBtn.innerHTML = isLoginMode ? 'Sign In' : 'Sign Up';
        submitBtn.disabled = false;
        isProcessingAction = false;
    }
</script>
</body>
</html>
