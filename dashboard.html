<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    body{ margin:0; height:100vh; display:flex; justify-content:center; align-items:center; background:#f5f5f5; font-family:Arial,sans-serif; }
    .card{ background:#fff; width:320px; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,.1); text-align:center; }
    img{ width:100px; height:100px; border-radius:50%; margin-bottom:15px; object-fit: cover; }
    button{ width:100%; padding:14px; border:none; border-radius:10px; background:#e53935; color:#fff; cursor:pointer; margin-top:20px; font-size: 16px; }
  </style>
</head>
<body>

  <div class="card">
    <div id="userData">Loading Profile...</div>
    <button id="logoutBtn" style="display: none;">Logout</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCqSMjr5__HNV-LXZi5vQvGzfBQ46lRFNA",
      authDomain: "auth-demo-f8ae4.firebaseapp.com",
      projectId: "auth-demo-f8ae4",
      storageBucket: "auth-demo-f8ae4.firebasestorage.app",
      messagingSenderId: "245702722359",
      appId: "1:245702722359:web:c669123eb90a1d282290b2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const userData = document.getElementById("userData");
    const logoutBtn = document.getElementById("logoutBtn");

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.replace("index.html");
      } else {
        // Agar user ki photo nahi hai (email signup), toh default avatar lagao
        const defaultPic = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        const profilePic = user.photoURL ? user.photoURL : defaultPic;
        
        // Agar display name set nahi hai, toh email ka starting part dikhao
        const displayName = user.displayName ? user.displayName : "New User";

        userData.innerHTML = `
          <img src="${profilePic}" alt="Profile">
          <h2>${displayName}</h2>
          <p>${user.email}</p>
        `;
        logoutBtn.style.display = "block";
      }
    });

    logoutBtn.addEventListener("click", async () => {
      logoutBtn.disabled = true;
      logoutBtn.textContent = "Logging out...";
      await signOut(auth);
    });
  </script>
</body>
</html>
