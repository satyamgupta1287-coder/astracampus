<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f5f5f5;
      font-family:Arial,sans-serif;
    }

    .card{
      background:#fff;
      width:320px;
      padding:30px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,.1);
      text-align:center;
    }

    img{
      width:100px;
      height:100px;
      border-radius:50%;
      margin-bottom:15px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#e53935;
      color:#fff;
      cursor:pointer;
      margin-top:20px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div id="userData">Loading...</div>

    <button id="logoutBtn">Logout</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCqSMjr5__HNV-LXZi5vQvGzfBQ46lRFNA",
      authDomain: "auth-demo-f8ae4.firebaseapp.com",
      projectId: "auth-demo-f8ae4",
      storageBucket: "auth-demo-f8ae4.firebasestorage.app",
      messagingSenderId: "245702722359",
      appId: "1:245702722359:web:c669123eb90a1d282290b2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const userData = document.getElementById("userData");
    const logoutBtn = document.getElementById("logoutBtn");

    onAuthStateChanged(auth, (user) => {

      if (!user) {
        window.location.href = "index.html";
        return;
      }

      userData.innerHTML = `
        <img src="${user.photoURL}">
        <h2>${user.displayName}</h2>
        <p>${user.email}</p>
      `;
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });
  </script>

</body>
</html>
