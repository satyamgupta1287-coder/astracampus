<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Complaints - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="pb-10">

<div class="bg-red-600 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button onclick="window.location.href='teacher-dashboard.html'" class="text-white hover:text-red-200 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-lg font-bold">Helpdesk & Complaints</h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">
    <div class="flex justify-between items-center mb-4 px-1">
        <h2 class="text-sm font-bold text-slate-800">Student Tickets</h2>
        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider bg-slate-200 px-2 py-1 rounded-md" id="ticketCount">0 Total</span>
    </div>

    <div id="complaintsContainer" class="space-y-4">
        <div class="text-center p-6 bg-white rounded-[20px] shadow-sm border border-slate-100">
            <p class="text-sm text-slate-400 font-medium"><i class="fas fa-spinner fa-spin mr-2"></i>Loading complaints...</p>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, where, onSnapshot, getDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    let adminSchoolId = null;
    const complaintsContainer = document.getElementById('complaintsContainer');
    const ticketCount = document.getElementById('ticketCount');

    // 1. Auth & Get Admin School ID
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const adminDoc = await getDoc(doc(db, "users", user.uid));
            if (adminDoc.exists()) {
                adminSchoolId = adminDoc.data().schoolId;
                loadComplaints();
            }
        } else {
            window.location.href = "../index.html";
        }
    });

    // 2. Load Complaints
    function loadComplaints() {
        const q = query(collection(db, "complaints"), where("schoolId", "==", adminSchoolId));
        onSnapshot(q, (snapshot) => {
            ticketCount.innerText = `${snapshot.size} Total`;

            if(snapshot.empty) {
                complaintsContainer.innerHTML = `
                    <div class="bg-white p-8 rounded-[20px] border border-slate-100 text-center shadow-sm">
                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 text-2xl mx-auto mb-3">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <p class="text-sm text-slate-500 font-bold">All clear! No complaints found.</p>
                    </div>`;
                return;
            }
            
            let items = [];
            snapshot.forEach(d => items.push({id: d.id, ...d.data()}));
            
            // Sort: Latest first
            items.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));

            complaintsContainer.innerHTML = "";
            items.forEach(item => {
                const isResolved = item.status === 'Resolved';
                const statusColor = isResolved ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600';
                const dateStr = item.createdAt ? new Date(item.createdAt.toDate()).toLocaleDateString('en-GB', {day:'numeric', month:'short'}) : 'Just now';

                let actionButton = "";
                if(!isResolved) {
                    actionButton = `
                        <button onclick="resolveComplaint('${item.id}')" class="w-full mt-4 bg-slate-50 hover:bg-emerald-50 border border-slate-200 hover:border-emerald-200 text-slate-600 hover:text-emerald-600 font-bold py-2.5 rounded-xl text-xs transition flex items-center justify-center gap-2">
                            <i class="fas fa-check"></i> Mark as Resolved
                        </button>
                    `;
                }

                complaintsContainer.innerHTML += `
                    <div class="bg-white p-5 rounded-[20px] shadow-sm border border-slate-100 transition hover:shadow-md">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h4 class="font-bold text-slate-800 text-sm mb-0.5">${item.title}</h4>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">
                                    <i class="fas fa-user-graduate mr-1"></i> ${item.studentName} (Class ${item.studentClass})
                                </p>
                            </div>
                            <span class="text-[9px] font-bold px-2 py-1 rounded text-slate-500 bg-slate-100 shrink-0 ml-2">${dateStr}</span>
                        </div>
                        
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 mb-3">
                            <p class="text-xs text-slate-600 leading-relaxed">${item.desc}</p>
                        </div>
                        
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-lg ${statusColor}">
                                ${isResolved ? 'Resolved' : 'Pending'}
                            </span>
                        </div>
                        ${actionButton}
                    </div>
                `;
            });
        });
    }

    // 3. Mark as Resolved Logic
    window.resolveComplaint = async (id) => {
        if(confirm("Are you sure you want to mark this issue as resolved?")) {
            try {
                await updateDoc(doc(db, "complaints", id), { 
                    status: 'Resolved' 
                });
            } catch (error) {
                alert("Error updating status: " + error.message);
            }
        }
    };
</script>
</body>
</html>
