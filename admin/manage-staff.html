<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Staff & Teachers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        .tab-active { border-bottom: 3px solid #9333ea; color: #9333ea; font-weight: bold; }
        .tab-inactive { color: #6b7280; font-weight: 500; }
        .section-title { font-size: 0.85rem; font-weight: 800; color: #4b5563; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-10">

    <header class="bg-fuchsia-700 p-5 text-white shadow-md flex items-center gap-4 sticky top-0 z-50">
        <button onclick="window.history.back()" class="bg-white/20 p-2 rounded-lg hover:bg-white/30 transition"><i class="fas fa-arrow-left"></i></button>
        <div>
            <h1 class="text-xl font-bold">Manage Staff</h1>
            <p class="text-xs text-fuchsia-200" id="adminSchoolBadge">Loading School Data...</p>
        </div>
    </header>

    <div class="max-w-4xl mx-auto bg-white flex border-b border-gray-200 sticky top-[72px] z-40 shadow-sm">
        <button onclick="switchTab('formTab')" id="btnFormTab" class="flex-1 py-4 tab-active transition"><i class="fas fa-user-tie mr-2"></i>Add Staff/Teacher</button>
        <button onclick="switchTab('listTab')" id="btnListTab" class="flex-1 py-4 tab-inactive transition"><i class="fas fa-list mr-2"></i>Staff Directory</button>
    </div>

    <div class="max-w-4xl mx-auto mt-6 px-4">
        <div id="formTab" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-xl font-bold text-gray-800 mb-6" id="formTitle">Register New Employee</h2>
            
            <form id="staffForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Employee ID (Auto)</label>
                        <input type="text" id="empId" readonly class="w-full p-2.5 border rounded-lg bg-gray-100 font-mono text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-purple-600 mb-1">Assign Role *</label>
                        <select id="empRole" required class="w-full p-2.5 border-2 border-purple-200 rounded-lg outline-none bg-purple-50 font-bold text-purple-700 focus:border-purple-500">
                            <option value="teacher">Teacher</option>
                            <option value="staff">Office Staff</option>
                            <option value="admin">Co-Admin</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button type="button" id="uploadPhotoBtn" class="w-full bg-gray-50 border border-gray-200 font-bold p-2.5 rounded-lg hover:bg-gray-100 flex justify-center items-center gap-2">
                            <i class="fas fa-camera"></i> Photo
                        </button>
                        <input type="hidden" id="photoUrl">
                    </div>
                </div>
                <div id="photoPreviewBox" class="hidden"><img id="photoPreview" class="w-20 h-20 object-cover rounded-xl border"></div>

                <div>
                    <h3 class="section-title"><i class="fas fa-id-badge mr-2"></i>Personal Info</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Full Name *</label><input type="text" id="fullName" required class="w-full p-2.5 border rounded-lg outline-none bg-gray-50"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Email Address *</label><input type="email" id="email" required class="w-full p-2.5 border rounded-lg outline-none bg-gray-50"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Mobile Number *</label><input type="tel" id="mobile" required class="w-full p-2.5 border rounded-lg outline-none bg-gray-50"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Gender</label>
                            <select id="gender" class="w-full p-2.5 border rounded-lg outline-none bg-gray-50">
                                <option value="Male">Male</option><option value="Female">Female</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="section-title"><i class="fas fa-briefcase mr-2"></i>Professional Details</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Qualification</label><input type="text" id="qualification" placeholder="e.g. M.Sc, B.Ed" class="w-full p-2.5 border rounded-lg outline-none bg-gray-50"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Department / Subject</label><input type="text" id="department" placeholder="e.g. Mathematics" class="w-full p-2.5 border rounded-lg outline-none bg-gray-50"></div>
                        <div><label class="block text-xs font-bold text-gray-600 mb-1">Date of Joining *</label><input type="date" id="doj" required class="w-full p-2.5 border rounded-lg outline-none bg-gray-50"></div>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-200">
                    <button type="submit" id="saveBtn" class="w-full bg-fuchsia-600 hover:bg-fuchsia-700 text-white font-bold py-4 rounded-xl shadow-lg transition text-lg">
                        <i class="fas fa-save mr-2"></i> Save Employee Record
                    </button>
                </div>
            </form>
        </div>

        <div id="listTab" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hidden">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Staff Directory</h2>
            <div id="staffContainer" class="space-y-4"><p class="text-gray-400 text-center py-10">Loading records...</p></div>
        </div>
    </div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, serverTimestamp, query, where, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    let currentEditId = null;
    let adminSchoolId = null; 

    // Auth & Verify
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const adminDoc = await getDoc(doc(db, "users", user.uid));
            if (adminDoc.exists() && adminDoc.data().role === "admin") {
                adminSchoolId = adminDoc.data().schoolId; 
                document.getElementById('adminSchoolBadge').innerText = "School Code: " + adminSchoolId;
                if(!document.getElementById('listTab').classList.contains('hidden')) loadStaff();
            } else {
                alert("Unauthorized Access!"); window.location.href = "dashboard.html";
            }
        } else { window.location.href = "../index.html"; }
    });

    window.switchTab = (tabId) => {
        document.getElementById('formTab').classList.add('hidden');
        document.getElementById('listTab').classList.add('hidden');
        document.getElementById(tabId).classList.remove('hidden');

        document.getElementById('btnFormTab').className = tabId === 'formTab' ? 'flex-1 py-4 tab-active transition' : 'flex-1 py-4 tab-inactive transition';
        document.getElementById('btnListTab').className = tabId === 'listTab' ? 'flex-1 py-4 tab-active transition' : 'flex-1 py-4 tab-inactive transition';
        if(tabId === 'listTab' && adminSchoolId) loadStaff();
    };

    window.generateAutoID = () => {
        if(!currentEditId) {
            document.getElementById('empId').value = "EMP" + new Date().getFullYear() + Math.floor(100 + Math.random() * 900);
            if(!document.getElementById('doj').value) document.getElementById('doj').value = new Date().toISOString().split('T')[0];
        }
    };
    generateAutoID();

    // Cloudinary
    const photoWidget = cloudinary.createUploadWidget({ cloudName: 'dl1cddemu', uploadPreset: 'upload', cropping: true, multiple: false }, (err, result) => {
        if (!err && result && result.event === "success") {
            document.getElementById('photoUrl').value = result.info.secure_url;
            document.getElementById('photoPreview').src = result.info.secure_url;
            document.getElementById('photoPreviewBox').classList.remove('hidden');
        }
    });
    document.getElementById('uploadPhotoBtn').addEventListener('click', () => photoWidget.open());

    // Save Staff
    document.getElementById('staffForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if(!adminSchoolId) return alert("School ID missing!");

        const btn = document.getElementById('saveBtn');
        btn.innerText = "Saving..."; btn.disabled = true;

        const staffData = {
            schoolId: adminSchoolId,
            role: document.getElementById('empRole').value, // Dynamic Role (Teacher, Admin, Staff)
            empId: document.getElementById('empId').value,
            name: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            mobile: document.getElementById('mobile').value,
            gender: document.getElementById('gender').value,
            qualification: document.getElementById('qualification').value,
            department: document.getElementById('department').value,
            doj: document.getElementById('doj').value,
            photoUrl: document.getElementById('photoUrl').value,
            updatedAt: serverTimestamp()
        };

        try {
            if(currentEditId) {
                await updateDoc(doc(db, "users", currentEditId), staffData);
                alert("Record Updated!");
            } else {
                staffData.createdAt = serverTimestamp();
                await addDoc(collection(db, "users"), staffData);
                alert(`${staffData.role.toUpperCase()} added successfully!`);
            }
            document.getElementById('staffForm').reset();
            currentEditId = null; generateAutoID(); switchTab('listTab');
        } catch (error) { alert("Error: " + error.message); } 
        finally { btn.innerHTML = `<i class="fas fa-save mr-2"></i> Save Employee Record`; btn.disabled = false; }
    });

    // Load Staff
    async function loadStaff() {
        const container = document.getElementById('staffContainer');
        container.innerHTML = `<p class="text-center text-fuchsia-500 py-10 font-bold"><i class="fas fa-spinner fa-spin mr-2"></i>Loading...</p>`;
        
        try {
            const q = query(collection(db, "users"), where("schoolId", "==", adminSchoolId));
            const snap = await getDocs(q);
            container.innerHTML = "";
            let count = 0;

            snap.forEach((docSnap) => {
                const data = docSnap.data();
                // Show everyone EXCEPT students
                if(data.role !== "student") {
                    count++;
                    const docId = docSnap.id;
                    const dataStr = encodeURIComponent(JSON.stringify({...data, id: docId}));
                    
                    let roleColor = data.role === 'admin' ? 'red' : (data.role === 'teacher' ? 'purple' : 'blue');

                    container.innerHTML += `
                        <div class="bg-gray-50 border p-4 rounded-xl flex justify-between items-center hover:shadow-md transition">
                            <div class="flex items-center gap-4">
                                <img src="${data.photoUrl || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" class="w-12 h-12 rounded-full object-cover border">
                                <div>
                                    <h3 class="font-bold text-gray-800">${data.name} <span class="text-[10px] uppercase font-bold text-${roleColor}-600 bg-${roleColor}-100 px-2 py-0.5 rounded ml-1">${data.role}</span></h3>
                                    <p class="text-xs text-gray-500 mt-0.5">${data.department || 'General'} | Mob: ${data.mobile}</p>
                                </div>
                            </div>
                            <div class="flex flex-col gap-2">
                                <button onclick="editStaff('${dataStr}')" class="bg-blue-100 text-blue-600 px-3 py-1.5 rounded-lg text-xs font-bold"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteStaff('${docId}')" class="bg-red-100 text-red-600 px-3 py-1.5 rounded-lg text-xs font-bold"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                }
            });
            if(count === 0) container.innerHTML = `<p class="text-gray-400 text-center py-10">No staff found.</p>`;
        } catch (e) { container.innerHTML = `<p class="text-red-500 text-center py-10">Error loading data.</p>`; }
    }

    window.editStaff = (encodedData) => {
        const data = JSON.parse(decodeURIComponent(encodedData));
        currentEditId = data.id;
        document.getElementById('formTitle').innerText = "Edit Employee";
        document.getElementById('saveBtn').innerHTML = `<i class="fas fa-save mr-2"></i> Update Record`;

        ['empId', 'empRole', 'fullName', 'email', 'mobile', 'gender', 'qualification', 'department', 'doj'].forEach(key => {
            if(document.getElementById(key) && data[key !== 'fullName' && key !== 'empRole' ? key : (key==='fullName'?'name':'role')]) {
                document.getElementById(key).value = data[key !== 'fullName' && key !== 'empRole' ? key : (key==='fullName'?'name':'role')];
            }
        });
        if(data.photoUrl) { document.getElementById('photoPreview').src = data.photoUrl; document.getElementById('photoPreviewBox').classList.remove('hidden'); }
        switchTab('formTab'); window.scrollTo(0,0);
    };

    window.deleteStaff = async (id) => {
        if(confirm("Delete this staff member permanently?")) {
            await deleteDoc(doc(db, "users", id)); alert("Deleted!"); loadStaff();
        }
    };
</script>
</body>
</html>
