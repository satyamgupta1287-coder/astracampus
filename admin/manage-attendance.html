<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-6">
    <h2 class="text-xl font-bold text-gray-800 mb-4">Mark Attendance</h2>
    <input type="date" id="attDate" class="w-full p-3 border rounded-xl mb-6 outline-none">
    
    <div id="attendanceStudentList" class="space-y-3">
        </div>
</div>

<script type="module">
    import { db } from '../js/firebase-init.js';
    import { collection, onSnapshot, query, where, addDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    // Set today's date
    document.getElementById('attDate').valueAsDate = new Date();

    const q = query(collection(db, "users"), where("role", "==", "student"));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('attendanceStudentList');
        list.innerHTML = "";
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            list.innerHTML += `
                <div class="flex justify-between items-center p-3 border rounded-xl">
                    <span class="font-medium text-gray-700">${data.name || data.email}</span>
                    <div class="flex gap-2">
                        <button onclick="markAtt('${docSnap.id}', 'present')" class="bg-green-100 text-green-700 px-3 py-1 rounded-lg text-sm font-bold">P</button>
                        <button onclick="markAtt('${docSnap.id}', 'absent')" class="bg-red-100 text-red-700 px-3 py-1 rounded-lg text-sm font-bold">A</button>
                    </div>
                </div>
            `;
        });
    });

    window.markAtt = async (studentId, status) => {
        const date = document.getElementById('attDate').value;
        await addDoc(collection(db, "attendance"), { studentId, date, status });
        alert(`Marked ${status.toUpperCase()} successfully!`);
    };
</script>
</body>
</html>
