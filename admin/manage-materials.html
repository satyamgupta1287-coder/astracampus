<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Materials</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-lg">
        <h1 class="text-xl font-bold mb-4">Admin Upload</h1>
        <input type="text" id="title" placeholder="File Title" class="w-full p-3 border rounded-xl mb-3">
        
        <select id="className" class="w-full p-3 border rounded-xl mb-3">
            <option value="Class 10">Class 10</option>
        </select>
        
        <select id="category" class="w-full p-3 border rounded-xl mb-4">
            <option value="Books">Books</option>
            <option value="Notes">Notes</option>
            <option value="PYQ">PYQ</option>
        </select>

        <button id="upload_btn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Upload PDF</button>
    </div>

<script type="module">
    import { db } from '../js/firebase-init.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const myWidget = cloudinary.createUploadWidget({ 
        cloudName: 'dl1cddemu', 
        uploadPreset: 'upload',
        resourceType: 'raw' 
    }, (err, result) => {
        if (!err && result.event === "success") {
            addDoc(collection(db, "study_materials"), { 
                title: document.getElementById('title').value,
                className: document.getElementById('className').value,
                category: document.getElementById('category').value,
                fileUrl: result.info.secure_url,
                createdAt: new Date()
            }).then(() => alert("Saved Successfully!"));
        }
    });
    document.getElementById("upload_btn").addEventListener("click", () => myWidget.open());
</script>
</body>
</html>
