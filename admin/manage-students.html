<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-6 mb-6">
    <h2 class="text-xl font-bold text-gray-800 mb-4">Add New Student</h2>
    <div class="space-y-4">
        <input type="email" id="studentEmail" placeholder="Student Email" class="w-full p-3 border rounded-xl outline-none bg-gray-50">
        <input type="text" id="studentName" placeholder="Full Name" class="w-full p-3 border rounded-xl outline-none bg-gray-50">
        <div class="grid grid-cols-2 gap-4">
            <input type="text" id="studentClass" placeholder="Class (e.g. 10)" class="w-full p-3 border rounded-xl outline-none bg-gray-50">
            <input type="text" id="studentSection" placeholder="Section" class="w-full p-3 border rounded-xl outline-none bg-gray-50">
        </div>
        <button id="addStudentBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">Add Student</button>
    </div>
</div>

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-6">
    <h2 class="text-lg font-bold text-gray-800 mb-4">All Students (<span id="stuCount">0</span>)</h2>
    <div id="studentsList" class="space-y-3 max-h-96 overflow-y-auto">
        <p class="text-gray-400 text-sm">Loading students...</p>
    </div>
</div>

<script type="module">
    import { db } from '../js/firebase-init.js';
    import { collection, addDoc, onSnapshot, query, where, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    // 1. Add Student Logic
    document.getElementById('addStudentBtn').addEventListener('click', async () => {
        const email = document.getElementById('studentEmail').value;
        const name = document.getElementById('studentName').value;
        const cls = document.getElementById('studentClass').value;
        const sec = document.getElementById('studentSection').value;
        
        if(!email || !name) return alert("Email aur Name zaroori hai!");
        
        await addDoc(collection(db, "users"), {
            email: email, name: name, class: cls, section: sec, role: "student", createdAt: serverTimestamp()
        });
        alert("Student Added!");
        document.getElementById('studentEmail').value = '';
        document.getElementById('studentName').value = '';
    });

    // 2. Fetch and Show Students Logic
    const q = query(collection(db, "users"), where("role", "==", "student"));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('studentsList');
        document.getElementById('stuCount').innerText = snapshot.size;
        list.innerHTML = "";
        
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            list.innerHTML += `
                <div class="flex justify-between items-center p-3 border rounded-xl bg-gray-50">
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${data.name || "No Name"} <span class="text-xs text-blue-600 bg-blue-100 px-2 rounded-full">Class ${data.class || 'N/A'}</span></p>
                        <p class="text-xs text-gray-500">${data.email}</p>
                    </div>
                    <button onclick="deleteStudent('${docSnap.id}')" class="text-red-500 hover:bg-red-100 p-2 rounded-lg transition">
                        Delete
                    </button>
                </div>
            `;
        });
    });

    // 3. Delete Student Logic (Global function banaya)
    window.deleteStudent = async (id) => {
        if(confirm("Kya aap sach me is student ko delete karna chahte hain?")) {
            await deleteDoc(doc(db, "users", id));
        }
    };
</script>
</body>
</html>
