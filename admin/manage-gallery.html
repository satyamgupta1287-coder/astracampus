<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-4 font-sans pb-24">

<div class="max-w-md mx-auto">
    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-4">
        <button onclick="window.location.href='admin.html'" class="text-gray-500 hover:text-pink-600 transition">
            <i class="fas fa-arrow-left text-xl"></i>
        </button>
        <h1 class="text-xl font-bold text-gray-800">School Gallery</h1>
        <div></div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border-t-4 border-pink-500">
        <h2 class="text-sm font-bold text-gray-400 uppercase mb-4"><i class="fas fa-image text-pink-500 mr-2"></i>Upload New Photo</h2>
        <form id="galleryForm" class="space-y-4" onsubmit="return false;">
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Photo Caption / Event Name *</label>
                <input type="text" id="caption" required placeholder="e.g., Annual Sports Day 2026" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-gray-50 focus:ring-2 focus:ring-pink-500">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Select Image *</label>
                <input type="file" id="imageFile" accept="image/*" required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-pink-50 file:text-pink-700 hover:file:bg-pink-100 cursor-pointer">
            </div>

            <div id="progressContainer" class="hidden">
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progressBar" class="bg-pink-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
                <p id="progressText" class="text-xs text-gray-500 text-center mt-1">Uploading: 0%</p>
            </div>

            <button type="submit" id="uploadBtn" class="w-full bg-pink-500 text-white font-bold py-3.5 rounded-xl hover:bg-pink-600 shadow-md transition flex justify-center items-center">
                <i class="fas fa-cloud-upload-alt mr-2"></i> Upload Photo
            </button>
        </form>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Gallery Images</h2>
        <div id="galleryList" class="grid grid-cols-2 gap-3">
            </div>
        <p id="noImageText" class="text-center text-sm text-gray-400 py-4 hidden">No photos uploaded yet.</p>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";
    import { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const storage = getStorage();
    const form = document.getElementById('galleryForm');
    const uploadBtn = document.getElementById('uploadBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');

    // --- UPLOAD LOGIC ---
    form.addEventListener('submit', async () => {
        const caption = document.getElementById('caption').value;
        const file = document.getElementById('imageFile').files[0];

        if (!file) return alert("Please select an image file!");

        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Processing...';
        progressContainer.classList.remove('hidden');

        const filePath = `gallery/${Date.now()}_${file.name}`;
        const fileRef = ref(storage, filePath);
        const uploadTask = uploadBytesResumable(fileRef, file);

        uploadTask.on('state_changed', 
            (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                progressBar.style.width = progress + '%';
                progressText.innerText = `Uploading: ${Math.round(progress)}%`;
            }, 
            (error) => {
                alert("Upload failed: " + error.message);
                resetFormState();
            }, 
            async () => {
                const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                try {
                    await addDoc(collection(db, "gallery"), {
                        caption, imageUrl: downloadURL, storagePath: filePath, createdAt: serverTimestamp()
                    });
                    alert("Photo Uploaded Successfully! 🎉");
                    form.reset();
                    resetFormState();
                } catch (err) {
                    alert("Error: " + err.message);
                    resetFormState();
                }
            }
        );
    });

    function resetFormState() {
        uploadBtn.disabled = false;
        uploadBtn.innerHTML = '<i class="fas fa-cloud-upload-alt mr-2"></i> Upload Photo';
        progressContainer.classList.add('hidden');
        progressBar.style.width = '0%';
    }

    // --- DISPLAY LOGIC ---
    const q = query(collection(db, "gallery"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('galleryList');
        const noText = document.getElementById('noImageText');
        list.innerHTML = "";
        
        if (snapshot.size === 0) return noText.classList.remove('hidden');
        noText.classList.add('hidden');

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            list.innerHTML += `
                <div class="relative rounded-xl overflow-hidden shadow-sm border border-gray-200 group">
                    <img src="${data.imageUrl}" alt="${data.caption}" class="w-full h-32 object-cover">
                    <div class="absolute bottom-0 left-0 right-0 bg-black/60 p-2 transform translate-y-full group-hover:translate-y-0 transition">
                        <p class="text-[10px] text-white font-bold truncate">${data.caption}</p>
                    </div>
                    <button onclick="deletePhoto('${docSnap.id}', '${data.storagePath}')" class="absolute top-2 right-2 w-8 h-8 bg-red-500 text-white rounded-full flex items-center justify-center shadow-lg hover:bg-red-600 transition">
                        <i class="fas fa-trash text-xs"></i>
                    </button>
                </div>
            `;
        });
    });

    window.deletePhoto = async (docId, storagePath) => {
        if(confirm("Delete this photo?")) {
            await deleteDoc(doc(db, "gallery", docId));
            if(storagePath) {
                const fileRef = ref(storage, storagePath);
                await deleteObject(fileRef);
            }
        }
    };
</script>
</body>
</html>
