<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body class="bg-gray-50 p-4 font-sans pb-24">

<div class="max-w-md mx-auto">
    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-4">
        <button onclick="window.location.href='admin.html'" class="text-gray-500 hover:text-pink-500 transition">
            <i class="fas fa-arrow-left text-xl"></i>
        </button>
        <h1 class="text-xl font-bold text-gray-800">School Gallery</h1>
        <div></div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border-t-4 border-pink-500">
        <h2 class="text-sm font-bold text-gray-400 uppercase mb-4"><i class="fas fa-image text-pink-500 mr-2"></i>Add New Photo</h2>
        <input type="text" id="caption" placeholder="Write a short caption..." class="w-full p-3 border border-gray-200 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-pink-500 bg-gray-50">
        <button id="upload_widget" class="w-full bg-pink-500 hover:bg-pink-600 text-white py-3.5 rounded-xl font-bold shadow-md transition flex justify-center items-center">
            <i class="fas fa-upload mr-2"></i> Select & Upload Photo
        </button>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Uploaded Photos</h2>
        <div id="galleryList" class="grid grid-cols-2 gap-4">
            <p class="col-span-2 text-center text-sm text-gray-400 py-4">Loading photos...</p>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, where, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    let adminSchoolId = null;

    // 1. Auth & Get School ID
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const adminDoc = await getDoc(doc(db, "users", user.uid));
            if (adminDoc.exists()) {
                adminSchoolId = adminDoc.data().schoolId;
                loadGallery(); // Load filtered photos
            }
        } else {
            window.location.href = "../index.html";
        }
    });

    // 2. Upload Logic
    const myWidget = cloudinary.createUploadWidget({ 
        cloudName: 'dl1cddemu', 
        uploadPreset: 'upload',
        clientAllowedFormats: ["jpg", "png", "jpeg", "webp"]
    }, async (err, result) => {
        if (!err && result && result.event === "success") {
            if(!adminSchoolId) return alert("School ID missing!");
            
            try {
                await addDoc(collection(db, "gallery"), { 
                    schoolId: adminSchoolId, // FILTER ADDED
                    caption: document.getElementById('caption').value || "School Memory", 
                    imageUrl: result.info.secure_url, 
                    createdAt: serverTimestamp() 
                });
                document.getElementById('caption').value = ""; // Clear input
            } catch (error) {
                alert("Error saving photo: " + error.message);
            }
        }
    });
    
    document.getElementById("upload_widget").addEventListener("click", () => myWidget.open());

    // 3. Display Gallery Logic (Filtered)
    function loadGallery() {
        const q = query(
            collection(db, "gallery"), 
            where("schoolId", "==", adminSchoolId), // FILTER ADDED
            orderBy("createdAt", "desc")
        );

        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('galleryList');
            list.innerHTML = "";

            if(snapshot.empty) {
                list.innerHTML = `<p class="col-span-2 text-center text-sm text-gray-400 py-4">No photos uploaded yet.</p>`;
                return;
            }

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                list.innerHTML += `
                    <div class="bg-gray-50 p-2 rounded-xl border border-gray-100 relative group">
                        <img src="${data.imageUrl}" class="w-full h-32 object-cover rounded-lg shadow-sm">
                        <p class="text-xs text-gray-600 font-bold mt-2 truncate px-1">${data.caption}</p>
                        
                        <button onclick="deletePhoto('${docSnap.id}')" class="absolute top-3 right-3 bg-white text-red-500 w-8 h-8 rounded-full shadow-md flex items-center justify-center opacity-90 hover:opacity-100 transition">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
            });
        });
    }

    // 4. Delete Logic
    window.deletePhoto = async (id) => {
        if(confirm("Are you sure you want to delete this photo?")) {
            await deleteDoc(doc(db, 'gallery', id));
        }
    };
</script>
</body>
</html>
