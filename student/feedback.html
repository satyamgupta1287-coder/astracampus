<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - AstraCampus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="pb-10">

<div class="bg-sky-500 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button onclick="window.location.href='dashboard.html'" class="text-white hover:text-sky-100 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-lg font-bold">Share Feedback</h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">
    
    <div class="text-center mb-6 px-4">
        <div class="w-16 h-16 bg-sky-100 text-sky-500 rounded-full flex items-center justify-center text-2xl mx-auto mb-3"><i class="fas fa-heart"></i></div>
        <h2 class="text-lg font-bold text-slate-800">We value your thoughts!</h2>
        <p class="text-xs text-slate-500 mt-1">Help us improve your school experience by sharing your suggestions or feedback.</p>
    </div>

    <div class="bg-white p-5 rounded-[20px] shadow-sm border border-slate-100 mb-8">
        <form id="feedbackForm" class="space-y-4" onsubmit="return false;">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Category</label>
                <select id="category" required class="w-full p-3 text-sm border border-slate-200 rounded-xl outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 bg-slate-50">
                    <option value="Suggestion">💡 General Suggestion</option>
                    <option value="Academics">📚 Academics & Teaching</option>
                    <option value="Facilities">🏫 School Facilities</option>
                    <option value="App Feedback">📱 App UI & Experience</option>
                </select>
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Your Feedback</label>
                <textarea id="message" rows="5" required placeholder="Write your feedback here..." class="w-full p-3 text-sm border border-slate-200 rounded-xl outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 bg-slate-50 resize-none"></textarea>
            </div>

            <p id="msgBox" class="text-xs font-bold text-center hidden"></p>
            
            <button type="submit" id="submitBtn" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3.5 rounded-xl transition shadow-md shadow-sky-200">
                Submit Feedback
            </button>
        </form>
    </div>

</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, addDoc, getDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    let currentUserData = null;
    const feedbackForm = document.getElementById('feedbackForm');
    const submitBtn = document.getElementById('submitBtn');
    const msgBox = document.getElementById('msgBox');

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) currentUserData = { uid: user.uid, ...userDoc.data() };
        }
    });

    feedbackForm.addEventListener('submit', async () => {
        if(!currentUserData) return;
        submitBtn.innerText = "Submitting..."; submitBtn.disabled = true;
        
        try {
            await addDoc(collection(db, "feedback"), {
                schoolId: currentUserData.schoolId,
                studentId: currentUserData.uid,
                studentName: currentUserData.name || currentUserData.firstName,
                category: document.getElementById('category').value,
                message: document.getElementById('message').value,
                createdAt: serverTimestamp()
            });
            feedbackForm.reset();
            msgBox.innerText = "🎉 Thank you! Your feedback has been recorded.";
            msgBox.className = "text-xs font-bold text-center block text-emerald-600";
        } catch(err) {
            msgBox.innerText = "❌ Error: " + err.message;
            msgBox.className = "text-xs font-bold text-center block text-red-500";
        }
        submitBtn.innerText = "Submit Feedback"; submitBtn.disabled = false;
        setTimeout(() => msgBox.classList.add('hidden'), 5000);
    });
</script>
</body>
</html>
