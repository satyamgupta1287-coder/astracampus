<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student - Assignments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .skeleton { animation: pulse 1.5s infinite; background: #e5e7eb; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans pb-20">

    <header class="bg-gradient-to-r from-green-600 to-teal-600 p-6 text-white shadow-md rounded-b-[2.5rem] relative mb-6">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='dashboard.html'" class="bg-white/20 hover:bg-white/30 p-2 rounded-xl backdrop-blur-sm transition">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div>
                <h1 class="text-2xl font-bold">My Assignments</h1>
                <p class="text-xs text-green-100 mt-0.5">Complete your pending tasks</p>
            </div>
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 mb-6">
        <div class="relative">
            <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="searchAssign" placeholder="Search assignments..." 
                   class="w-full pl-10 pr-4 py-3 rounded-2xl shadow-sm border border-gray-200 outline-none focus:ring-2 ring-green-500/20 text-gray-700 bg-white">
        </div>
    </div>

    <main id="assignList" class="max-w-md mx-auto px-4 space-y-4">
        <div class="skeleton w-full h-24 rounded-2xl"></div>
        <div class="skeleton w-full h-24 rounded-2xl"></div>
    </main>

<script type="module">
    // DHYAN DEIN: Yahan apna sahi firebase-init.js ka path lagayein
    import { db } from '../js/firebase-init.js'; 
    import { collection, query, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    let assignmentsData = [];
    const searchAssign = document.getElementById('searchAssign');
    const assignList = document.getElementById('assignList');

    // Live query setup for 'assignments' collection
    // Note: Agar specific class ka filter lagana hai, toh where("targetClass", "==", "Class 10") add kar sakte hain
    const q = query(
        collection(db, "assignments"), 
        orderBy("createdAt", "desc")
    );

    onSnapshot(q, (snapshot) => {
        assignmentsData = [];
        snapshot.forEach(doc => {
            assignmentsData.push(doc.data());
        });
        renderAssignments(assignmentsData);
    }, (error) => {
        assignList.innerHTML = `<p class="text-center text-red-500 py-10">Error loading data: ${error.message}</p>`;
    });

    // Render list into UI
    function renderAssignments(data) {
        assignList.innerHTML = "";
        
        if(data.length === 0) {
            assignList.innerHTML = `
                <div class="text-center py-16 bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
                    <div class="w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <p class="text-gray-800 font-bold text-lg">All Caught Up!</p>
                    <p class="text-sm text-gray-400 mt-1">No pending assignments at the moment.</p>
                </div>`;
            return;
        }

        data.forEach(item => {
            // Cloudinary download link error fix (fl_attachment)
            const rawUrl = item.fileUrl || "#";
            const optimizedUrl = rawUrl.includes('/upload/') ? rawUrl.replace('/upload/', '/upload/fl_attachment/') : rawUrl;

            assignList.innerHTML += `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col transition-all hover:shadow-md relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-red-50 text-red-600 text-[10px] font-bold px-3 py-1 rounded-bl-xl border-b border-l border-red-100">
                        Pending
                    </div>
                    
                    <h3 class="font-bold text-gray-800 text-lg leading-tight pr-16">${item.title || 'Untitled Assignment'}</h3>
                    <p class="text-xs text-gray-500 mt-1"><i class="fas fa-book mr-1"></i> ${item.subject || item.className || 'General'}</p>
                    
                    <div class="mt-4 flex gap-2">
                        <a href="${optimizedUrl}" target="_blank" 
                           class="flex-1 bg-green-50 text-green-600 border border-green-200 hover:bg-green-100 py-2 rounded-xl font-bold shadow-sm transition-colors text-center text-sm flex items-center justify-center gap-2">
                            <i class="fas fa-download"></i> Download PDF
                        </a>
                    </div>
                </div>
            `;
        });
    }

    // Live Search input trigger
    searchAssign.addEventListener('input', (e) => {
        const text = e.target.value.toLowerCase();
        const filtered = assignmentsData.filter(item => 
            (item.title && item.title.toLowerCase().includes(text)) || 
            (item.subject && item.subject.toLowerCase().includes(text))
        );
        renderAssignments(filtered);
    });
</script>
</body>
</html>
