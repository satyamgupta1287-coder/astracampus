<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - AstraCampus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="pb-10">

<div class="bg-blue-600 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button onclick="window.location.href='../dashboard.html'" class="text-white hover:text-blue-200 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-lg font-bold flex items-center gap-2">
        <i class="fas fa-play-circle"></i> Recorded Lectures
    </h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">
    <h3 class="font-bold text-slate-800 mb-4 text-sm px-1 flex items-center gap-2">
        <i class="fas fa-layer-group text-slate-400"></i> Choose a Course
    </h3>

    <div id="courseContainer" class="space-y-3">
        <div class="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center">
            <p class="text-sm text-slate-400 font-medium"><i class="fas fa-spinner fa-spin mr-2"></i>Loading courses...</p>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, where, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const courseContainer = document.getElementById('courseContainer');
    let coursePhotoMap = {}; // course name -> photoUrl

    // Aesthetic icon/color rotation for course cards
    const palette = [
        { icon: 'fa-flask', bg: 'bg-blue-50', text: 'text-blue-600' },
        { icon: 'fa-atom', bg: 'bg-purple-50', text: 'text-purple-600' },
        { icon: 'fa-square-root-variable', bg: 'bg-emerald-50', text: 'text-emerald-600' },
        { icon: 'fa-graduation-cap', bg: 'bg-amber-50', text: 'text-amber-600' },
        { icon: 'fa-microscope', bg: 'bg-rose-50', text: 'text-rose-600' },
    ];

    function showEmpty() {
        courseContainer.innerHTML = `
            <div class="bg-white p-8 rounded-[20px] border text-center shadow-sm">
                <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 text-2xl mx-auto mb-3"><i class="fas fa-video-slash"></i></div>
                <p class="text-sm text-slate-500 font-bold">No courses available yet.</p>
            </div>`;
    }

    function showError(message) {
        courseContainer.innerHTML = `
            <div class="bg-red-50 p-6 rounded-[20px] border border-red-100 text-center">
                <p class="text-xs text-red-500 font-bold break-words">${message}</p>
            </div>`;
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "../index.html";
            return;
        }

        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (!userDoc.exists()) return showError("User profile not found in database.");

            const userData = userDoc.data();
            const schoolId = String(userData.schoolId || "").trim();
            const studentClass = String(userData.class || "").trim();

            let latestVideoSnapshot = null;

            function renderCourses() {
                if (!latestVideoSnapshot) return;

                const courseSet = new Set();
                latestVideoSnapshot.forEach((d) => {
                    const data = d.data();
                    if (String(data.targetClass || "").trim() === studentClass && data.course) {
                        courseSet.add(data.course);
                    }
                });

                const courses = Array.from(courseSet).sort();

                if (courses.length === 0) return showEmpty();

                courseContainer.innerHTML = "";
                courses.forEach((course, i) => {
                    const style = palette[i % palette.length];
                    const encodedCourse = encodeURIComponent(course);
                    const photoUrl = coursePhotoMap[course];

                    const thumbHtml = photoUrl
                        ? `<img src="${photoUrl}" class="w-14 h-14 rounded-2xl object-cover shrink-0" />`
                        : `<div class="w-12 h-12 ${style.bg} ${style.text} rounded-2xl flex items-center justify-center text-lg shrink-0">
                               <i class="fas ${style.icon}"></i>
                           </div>`;

                    courseContainer.innerHTML += `
                        <div onclick="window.location.href='course-subjects.html?course=${encodedCourse}'" 
                             class="bg-white rounded-[20px] shadow-sm border border-slate-100 p-4 flex items-center gap-4 cursor-pointer active:scale-[0.98] transition">
                            ${thumbHtml}
                            <div class="flex-1 min-w-0">
                                <h4 class="font-bold text-slate-800 text-sm truncate">${course}</h4>
                                <p class="text-[11px] text-slate-400 font-medium">Tap to view subjects</p>
                            </div>
                            <i class="fas fa-chevron-right text-slate-300 text-sm"></i>
                        </div>
                    `;
                });
            }

            // courseMeta collection se is school ke saare course photos fetch karo
            const metaQuery = query(collection(db, "courseMeta"), where("schoolId", "==", schoolId));
            onSnapshot(metaQuery, (metaSnapshot) => {
                coursePhotoMap = {};
                metaSnapshot.forEach((d) => {
                    const data = d.data();
                    if (data.course) coursePhotoMap[data.course] = data.photoUrl;
                });
                renderCourses(); // Photo aane ke baad bhi re-render, taaki photo dikh sake
            });

            // Sirf schoolId se query (single-field, index ki zaroorat nahi)
            const q = query(collection(db, "videos"), where("schoolId", "==", schoolId));

            onSnapshot(
                q,
                (snapshot) => {
                    latestVideoSnapshot = snapshot;
                    renderCourses();
                },
                (error) => showError("Error loading courses: " + error.message)
            );
        } catch (err) {
            showError("Error: " + err.message);
        }
    });
</script>
</body>
</html>
