<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Courses - AstraCampus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .success-zoom { transform: scale(1) !important; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="pb-10">

<div class="bg-blue-600 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button onclick="window.location.href='dashboard.html'" class="text-white hover:text-blue-200 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-lg font-bold flex items-center gap-2">
        <i class="fas fa-crown text-yellow-300"></i> Pro Batches
    </h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">
    <h3 class="font-bold text-slate-800 mb-4 text-lg px-1 flex items-center gap-2">Premium Courses</h3>
    <div id="courseContainer" class="space-y-6">
        <div class="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center">
            <p class="text-sm text-slate-400 font-medium"><i class="fas fa-spinner fa-spin mr-2"></i>Loading batches...</p>
        </div>
    </div>
</div>

<div id="successModal" class="fixed inset-0 z- bg-black/80 backdrop-blur-sm hidden flex-col items-center justify-center px-4">
    <div class="bg-white w-full max-w-sm rounded-[24px] p-6 text-center shadow-2xl transform scale-0" id="successCard">
        <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-500 text-4xl mx-auto mb-4 shadow-inner">
            <i class="fas fa-check-circle"></i>
        </div>
        <h2 class="text-xl font-bold text-slate-800 mb-2">Payment Successful!</h2>
        <p class="text-sm text-slate-500 mb-6">Welcome to the Premium Batch: <br><strong class="text-blue-600" id="successCourseName"></strong></p>
        <button onclick="closeSuccessModal()" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl active:scale-95 transition shadow-lg shadow-emerald-200">Start Learning Now</button>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, where, onSnapshot, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const RZP_KEY = "rzp_test_T5RF77BGnGrTIV"; 
    const courseContainer = document.getElementById('courseContainer');
    
    let currentUserId = null;
    let currentUserData = null;
    let allVideos = [];
    let coursePhotoMap = {};

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "index.html"; return; }
        currentUserId = user.uid;

        onSnapshot(doc(db, "users", currentUserId), (userDoc) => {
            if (!userDoc.exists()) return;
            currentUserData = userDoc.data();
            const schoolId = String(currentUserData.schoolId || "").trim();

            onSnapshot(query(collection(db, "courseMeta"), where("schoolId", "==", schoolId)), (metaSnap) => {
                coursePhotoMap = {};
                metaSnap.forEach((d) => { if (d.data().course) coursePhotoMap[d.data().course] = d.data().photoUrl; });
                renderCourses();
            });

            onSnapshot(query(collection(db, "videos"), where("schoolId", "==", schoolId)), (videoSnap) => {
                allVideos = [];
                videoSnap.forEach((d) => allVideos.push(d.data()));
                renderCourses();
            });
        });
    });

    function renderCourses() {
        if (!currentUserData) return;
        const courseSet = new Set();
        allVideos.forEach((v) => { if (v.course) courseSet.add(v.course); });
        const courses = Array.from(courseSet).sort();

        if (courses.length === 0) {
            courseContainer.innerHTML = `<div class="bg-white p-8 rounded-[20px] border text-center shadow-sm"><p class="text-sm text-slate-500 font-bold">No batches available right now.</p></div>`;
            return;
        }

        const purchasedCourses = currentUserData.purchasedCourses || [];
        courseContainer.innerHTML = "";

        courses.forEach(course => {
            const isPurchased = purchasedCourses.includes(course);
            const photo = coursePhotoMap[course] || 'https://via.placeholder.com/600x338/e2e8f0/94a3b8?text=Course+Cover';
            const safeCourse = course.replace(/'/g, "\\'");
            const encodedCourse = encodeURIComponent(course);

            if (isPurchased) {
                // 🔓 UNLOCKED COURSE
                courseContainer.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-md border border-emerald-200 overflow-hidden relative">
                        <div class="absolute top-0 left-0 bg-emerald-500 text-white text-[10px] font-bold px-3 py-1 rounded-br-lg z-10 shadow-sm"><i class="fas fa-check-circle mr-1"></i> ENROLLED</div>
                        <div class="w-full relative aspect-[16/9] bg-slate-100 cursor-pointer" onclick="window.location.href='course-subjects.html?course=${encodedCourse}'">
                            <img src="${photo}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                        </div>
                        <div class="p-4">
                            <h2 class="text-lg font-bold text-slate-800 leading-tight mb-4">${course}</h2>
                            <button onclick="window.location.href='course-subjects.html?course=${encodedCourse}'" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl text-sm active:scale-95 transition shadow-lg shadow-emerald-200 flex justify-center items-center gap-2">CONTINUE LEARNING <i class="fas fa-arrow-right"></i></button>
                        </div>
                    </div>`;
            } else {
                // 🔒 LOCKED COURSE (Explore Button takes inside now!)
                courseContainer.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden relative">
                        <div class="absolute top-0 left-0 bg-blue-600 text-white text-[10px] font-bold px-4 py-1.5 rounded-br-xl z-10 shadow-sm tracking-wide">ONLINE</div>
                        <div class="w-full relative aspect-[16/9] bg-slate-100 cursor-pointer" onclick="window.location.href='course-subjects.html?course=${encodedCourse}'">
                            <img src="${photo}" class="w-full h-full object-cover">
                        </div>
                        <div class="p-4">
                            <div class="flex justify-between items-start mb-3">
                                <h2 class="text-[17px] font-black text-slate-800 leading-tight">${course}</h2>
                                <span class="bg-slate-100 text-slate-600 text-[10px] font-bold px-2.5 py-1 rounded-full border border-slate-200">Hinglish</span>
                            </div>
                            <div class="bg-slate-900 text-white text-[10px] font-bold px-3 py-2.5 rounded-xl mb-4 flex justify-between items-center shadow-inner">
                                <span class="text-slate-200">Premium Features <span class="text-white">Included</span></span>
                                <span class="bg-gradient-to-r from-[#d4af37] to-[#aa8017] text-black px-2.5 py-0.5 rounded shadow-sm tracking-wide">INFINITY</span>
                            </div>
                            <div class="flex items-center gap-2.5 mb-4">
                                <span class="text-[22px] font-black text-[#5a4bda]">₹499</span>
                                <span class="text-sm text-slate-400 line-through font-medium">₹1,999</span>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="window.location.href='course-subjects.html?course=${encodedCourse}'" class="flex-1 border-2 border-[#5a4bda] text-[#5a4bda] font-bold py-2.5 rounded-xl text-sm active:scale-95 transition tracking-wide">EXPLORE</button>
                                <button onclick="buyCourse('${safeCourse}', 499)" class="flex-1 bg-[#5a4bda] hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl text-sm active:scale-95 transition shadow-lg shadow-indigo-200 tracking-wide">BUY NOW</button>
                            </div>
                        </div>
                    </div>`;
            }
        });
    }

    window.buyCourse = function(courseName, price) {
        const options = {
            "key": RZP_KEY, "amount": price * 100, "currency": "INR", "name": "AstraCampus Premium", "description": "Unlock: " + courseName,
            "handler": async function (response) {
                try {
                    await updateDoc(doc(db, "users", currentUserId), { purchasedCourses: arrayUnion(courseName) });
                    document.getElementById('successCourseName').innerText = courseName;
                    document.getElementById('successModal').classList.remove('hidden'); document.getElementById('successModal').classList.add('flex');
                    setTimeout(() => document.getElementById('successCard').classList.add('success-zoom'), 50);
                } catch (err) { alert("Error: " + err.message); }
            },
            "prefill": { "name": currentUserData.name, "email": currentUserData.email, "contact": currentUserData.phone }, "theme": { "color": "#5a4bda" }
        };
        const rzp = new Razorpay(options); rzp.open();
    };

    window.closeSuccessModal = function() {
        document.getElementById('successCard').classList.remove('success-zoom');
        setTimeout(() => { document.getElementById('successModal').classList.add('hidden'); document.getElementById('successModal').classList.remove('flex'); }, 200);
    };
</script>
</body>
</html>
