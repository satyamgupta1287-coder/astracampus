<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Courses - AstraCampus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .success-zoom { transform: scale(1) !important; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="pb-10">

<div class="bg-blue-600 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button onclick="window.location.href='dashboard.html'" class="text-white hover:text-blue-200 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-lg font-bold flex items-center gap-2">
        <i class="fas fa-crown text-yellow-300"></i> Pro Batches
    </h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">
    <h3 class="font-bold text-slate-800 mb-4 text-sm px-1 flex items-center gap-2">
        <i class="fas fa-layer-group text-slate-400"></i> Explore & Enroll
    </h3>

    <div id="courseContainer" class="space-y-4">
        <div class="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center">
            <p class="text-sm text-slate-400 font-medium"><i class="fas fa-spinner fa-spin mr-2"></i>Loading batches...</p>
        </div>
    </div>
</div>

<div id="successModal" class="fixed inset-0 z- bg-black/80 backdrop-blur-sm hidden flex-col items-center justify-center px-4">
    <div class="bg-white w-full max-w-sm rounded-[24px] p-6 text-center shadow-2xl transform scale-0" id="successCard">
        <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-500 text-4xl mx-auto mb-4 shadow-inner">
            <i class="fas fa-check-circle"></i>
        </div>
        <h2 class="text-xl font-bold text-slate-800 mb-2">Payment Successful!</h2>
        <p class="text-sm text-slate-500 mb-6">Welcome to the Premium Batch: <br><strong class="text-blue-600" id="successCourseName"></strong></p>
        <button onclick="closeSuccessModal()" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl active:scale-95 transition shadow-lg shadow-emerald-200">Start Learning Now</button>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, where, onSnapshot, getDoc, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    // 🌟 AAPKI RAZORPAY TEST KEY
    const RZP_KEY = "rzp_test_T5RF77BGnGrTIV"; 

    const courseContainer = document.getElementById('courseContainer');
    
    let currentUserId = null;
    let currentUserData = null;
    let allVideos = [];
    let coursePhotoMap = {};

    function showError(message) {
        courseContainer.innerHTML = `<div class="bg-red-50 p-6 rounded-[20px] border border-red-100 text-center"><p class="text-xs text-red-500 font-bold">${message}</p></div>`;
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "index.html";
            return;
        }
        currentUserId = user.uid;

        try {
            // 🌟 SNAPSHOT LAGA DIYA: Jaise hi payment hogi, UI turant update hoga bina refresh kiye!
            onSnapshot(doc(db, "users", currentUserId), (userDoc) => {
                if (!userDoc.exists()) return showError("User profile not found.");
                currentUserData = userDoc.data();
                const schoolId = String(currentUserData.schoolId || "").trim();

                // 1. Photos layein
                onSnapshot(query(collection(db, "courseMeta"), where("schoolId", "==", schoolId)), (metaSnap) => {
                    coursePhotoMap = {};
                    metaSnap.forEach((d) => {
                        const data = d.data();
                        if (data.course) coursePhotoMap[data.course] = data.photoUrl;
                    });
                    renderCourses();
                });

                // 2. Videos layein (Courses ke naam nikalne ke liye)
                onSnapshot(query(collection(db, "videos"), where("schoolId", "==", schoolId)), (videoSnap) => {
                    allVideos = [];
                    videoSnap.forEach((d) => allVideos.push(d.data()));
                    renderCourses();
                });
            });
        } catch (err) {
            showError("Error: " + err.message);
        }
    });

    function renderCourses() {
        if (!currentUserData) return;
        
        const courseSet = new Set();
        allVideos.forEach((v) => {
            if (v.course && v.course.trim() !== "") courseSet.add(v.course);
        });

        const courses = Array.from(courseSet).sort();

        if (courses.length === 0) {
            courseContainer.innerHTML = `<div class="bg-white p-8 rounded-[20px] border text-center shadow-sm"><div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 text-2xl mx-auto mb-3"><i class="fas fa-video-slash"></i></div><p class="text-sm text-slate-500 font-bold">No batches available right now.</p></div>`;
            return;
        }

        // Check ki user ne kaun se courses khareede hain
        const purchasedCourses = currentUserData.purchasedCourses || [];

        courseContainer.innerHTML = "";
        courses.forEach(course => {
            const isPurchased = purchasedCourses.includes(course);
            const photo = coursePhotoMap[course] || 'https://via.placeholder.com/150/e2e8f0/94a3b8?text=Course';
            const safeCourse = course.replace(/'/g, "\\'");

            if (isPurchased) {
                // 🔓 UNLOCKED COURSE (Premium lagne ke baad)
                courseContainer.innerHTML += `
                    <div onclick="window.location.href='course-subjects.html?course=${encodeURIComponent(course)}'" 
                         class="bg-white rounded-[20px] shadow-sm border border-emerald-100 p-3 flex items-center gap-4 cursor-pointer active:scale-[0.98] transition relative overflow-hidden">
                        
                        <div class="absolute top-0 right-0 bg-emerald-500 text-white text-[9px] font-bold px-2 py-1 rounded-bl-lg shadow-sm">
                            <i class="fas fa-check-circle mr-1"></i>Enrolled
                        </div>
                        
                        <img src="${photo}" class="w-20 h-20 rounded-xl object-cover border border-slate-100 shadow-sm">
                        <div class="flex-1 pr-2">
                            <h4 class="font-bold text-slate-800 text-sm mb-2 leading-tight">${course}</h4>
                            <p class="text-[10px] text-emerald-600 font-bold bg-emerald-50 inline-block px-2.5 py-1.5 rounded-md">View Subjects <i class="fas fa-arrow-right ml-1"></i></p>
                        </div>
                    </div>
                `;
            } else {
                // 🔒 LOCKED COURSE (Kharidne ke liye)
                courseContainer.innerHTML += `
                    <div onclick="buyCourse('${safeCourse}', 499)" 
                         class="bg-white rounded-[20px] shadow-sm border border-slate-100 p-3 flex items-center gap-4 cursor-pointer active:scale-[0.98] transition relative group">
                        
                        <div class="relative w-20 h-20 shrink-0">
                            <img src="${photo}" class="w-full h-full rounded-xl object-cover border border-slate-100 opacity-60 grayscale-[40%] transition group-active:opacity-100">
                            <div class="absolute inset-0 flex items-center justify-center bg-slate-900/30 rounded-xl backdrop-blur-[1.5px]">
                                <div class="w-8 h-8 bg-white/40 backdrop-blur-md border border-white/50 rounded-full flex items-center justify-center text-white shadow-lg"><i class="fas fa-lock text-sm"></i></div>
                            </div>
                        </div>
                        
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-800 text-sm mb-2 leading-tight">${course}</h4>
                            <button class="bg-blue-600 text-white text-[10px] font-bold px-3 py-2 rounded-lg w-full flex justify-between items-center shadow-md shadow-blue-200 active:bg-blue-700 transition">
                                <span>Get Premium</span>
                                <span class="bg-white/20 px-1.5 py-0.5 rounded">₹499</span>
                            </button>
                        </div>
                    </div>
                `;
            }
        });
    }

    // 🌟 RAZORPAY PAYMENT FUNCTION
    window.buyCourse = function(courseName, price) {
        const options = {
            "key": RZP_KEY,
            "amount": price * 100, // Amount paise mein hota hai (49900 paise = ₹499)
            "currency": "INR",
            "name": "AstraCampus Premium",
            "description": "Unlock Full Access: " + courseName,
            "image": "https://cdn-icons-png.flaticon.com/512/2097/2097754.png", // Demo Logo
            "handler": async function (response) {
                // Yahan aayega jab payment "Success" ho jayegi
                try {
                    const userRef = doc(db, "users", currentUserId);
                    // Database me course add kar do
                    await updateDoc(userRef, {
                        purchasedCourses: arrayUnion(courseName)
                    });
                    
                    // Success Popup Dikhao
                    document.getElementById('successCourseName').innerText = courseName;
                    document.getElementById('successModal').classList.remove('hidden');
                    document.getElementById('successModal').classList.add('flex');
                    setTimeout(() => {
                        document.getElementById('successCard').classList.add('success-zoom');
                    }, 50);

                } catch (err) {
                    alert("Error unlocking course in database: " + err.message);
                }
            },
            "prefill": {
                "name": currentUserData.name || "Student",
                "email": currentUserData.email || "student@astracampus.com",
                "contact": currentUserData.phone || "9999999999"
            },
            "theme": {
                "color": "#2563eb" // Blue Theme
            }
        };

        const rzp = new Razorpay(options);
        rzp.on('payment.failed', function (response){
            alert("Payment Failed! " + response.error.description);
        });
        rzp.open();
    };

    window.closeSuccessModal = function() {
        document.getElementById('successCard').classList.remove('success-zoom');
        setTimeout(() => {
            document.getElementById('successModal').classList.add('hidden');
            document.getElementById('successModal').classList.remove('flex');
        }, 200);
    };

</script>
</body>
</html>
