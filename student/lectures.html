<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures - AstraCampus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        #videoModal.flex { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .success-zoom { transform: scale(1) !important; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
    <script src="https://fast.wistia.net/assets/external/E-v1.js" async></script>
</head>
<body class="pb-10">

<div class="bg-blue-600 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button id="backBtn" class="text-white hover:text-blue-200 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 id="pageTitle" class="text-lg font-bold flex items-center gap-2 truncate">
        <i class="fas fa-play-circle"></i> Lectures
    </h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">
    <h3 class="font-bold text-slate-800 mb-4 text-sm px-1 flex items-center gap-2">
        <i class="fas fa-list text-slate-400"></i> Course Content
    </h3>
    <div id="videoContainer" class="space-y-5">
        <div class="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center">
            <p class="text-sm text-slate-400 font-medium"><i class="fas fa-spinner fa-spin mr-2"></i>Loading videos...</p>
        </div>
    </div>
</div>

<div id="videoModal" class="fixed inset-0 z- bg-black/90 backdrop-blur-sm hidden flex-col items-center justify-center px-4">
    <div class="w-full max-w-md bg-slate-900 rounded-[20px] overflow-hidden shadow-2xl">
        <div class="flex items-center justify-between px-4 py-3 border-b border-white/10">
            <h3 id="modalTitle" class="text-white font-bold text-sm truncate pr-3">Lecture</h3>
            <button onclick="closeVideo()" class="w-9 h-9 shrink-0 bg-white/10 hover:bg-white/20 rounded-full text-white flex justify-center items-center active:scale-90"><i class="fas fa-times"></i></button>
        </div>
        <div class="w-full relative bg-black" id="modalPlayerContainer" style="aspect-ratio: 16/9;"></div>
    </div>
</div>

<div id="successModal" class="fixed inset-0 z- bg-black/80 backdrop-blur-sm hidden flex-col items-center justify-center px-4">
    <div class="bg-white w-full max-w-sm rounded-[24px] p-6 text-center shadow-2xl transform scale-0" id="successCard">
        <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-500 text-4xl mx-auto mb-4 shadow-inner">
            <i class="fas fa-check-circle"></i>
        </div>
        <h2 class="text-xl font-bold text-slate-800 mb-2">Unlocked Successfully!</h2>
        <p class="text-sm text-slate-500 mb-6">Enjoy your premium access.</p>
        <button onclick="closeSuccessModal()" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl active:scale-95 transition">Watch Lectures</button>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, where, onSnapshot, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const RZP_KEY = "rzp_test_T5RF77BGnGrTIV"; 

    const videoContainer = document.getElementById('videoContainer');
    const pageTitle = document.getElementById('pageTitle');
    const backBtn = document.getElementById('backBtn');

    const params = new URLSearchParams(window.location.search);
    const selectedCourse = params.get('course');
    const selectedSubject = params.get('subject');
    const safeCourseName = selectedCourse ? selectedCourse.replace(/'/g, "\\'") : '';

    if (!selectedCourse || !selectedSubject) { window.location.href = "courses.html"; } 
    else {
        pageTitle.innerHTML = `<i class="fas fa-play-circle"></i> <span class="truncate">${selectedSubject}</span>`;
        backBtn.onclick = () => window.location.href = `course-subjects.html?course=${encodeURIComponent(selectedCourse)}`;
    }

    let currentUserId = null;
    let currentUserData = null;
    let isPurchased = false;

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "../index.html"; return; }
        currentUserId = user.uid;

        onSnapshot(doc(db, "users", currentUserId), (userDoc) => {
            if (!userDoc.exists()) return;
            currentUserData = userDoc.data();
            const schoolId = String(currentUserData.schoolId || "").trim();
            const studentClass = String(currentUserData.class || "").trim();
            const purchasedCourses = currentUserData.purchasedCourses || [];
            
            isPurchased = purchasedCourses.includes(selectedCourse);

            // Fetch Videos
            onSnapshot(query(collection(db, "videos"), where("schoolId", "==", schoolId)), (snapshot) => {
                let videos = [];
                snapshot.forEach((d) => {
                    const data = d.data();
                    if (String(data.targetClass || "").trim() === studentClass && data.course === selectedCourse && data.subject === selectedSubject) {
                        videos.push({ id: d.id, ...data });
                    }
                });

                if (videos.length === 0) {
                    videoContainer.innerHTML = `<div class="bg-white p-8 rounded-[20px] border text-center shadow-sm"><p class="text-sm text-slate-500 font-bold">No lectures uploaded yet.</p></div>`;
                    return;
                }

                videos.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                videoContainer.innerHTML = "";

                videos.forEach((video) => {
                    const safeTitle = (video.title || "Untitled").replace(/'/g, "\\'");

                    if (isPurchased) {
                        // 🔓 UNLOCKED VIDEO UI
                        let actionButtonsHtml = "";
                        if (video.notesUrl || video.testUrl) {
                            actionButtonsHtml = `<div class="px-4 pb-4 flex gap-2 border-t border-slate-50 pt-3 mt-1">`;
                            if (video.notesUrl) actionButtonsHtml += `<a href="${video.notesUrl}" target="_blank" class="flex-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 text-[11px] font-bold py-2 rounded-xl flex justify-center items-center gap-1.5 active:scale-95 transition"><i class="fas fa-file-pdf"></i> Class Notes</a>`;
                            if (video.testUrl) actionButtonsHtml += `<a href="${video.testUrl}" target="_blank" class="flex-1 bg-purple-50 hover:bg-purple-100 text-purple-600 text-[11px] font-bold py-2 rounded-xl flex justify-center items-center gap-1.5 active:scale-95 transition"><i class="fas fa-file-alt"></i> DPP / Test</a>`;
                            actionButtonsHtml += `</div>`;
                        }

                        videoContainer.innerHTML += `
                            <div class="bg-white rounded-[20px] shadow-sm border border-slate-100 overflow-hidden mb-5">
                                <div onclick="startVideo('${video.wistiaId}', '${safeTitle}')" class="w-full relative bg-slate-900 cursor-pointer group" style="aspect-ratio: 16/9;">
                                    <img src="https://fast.wistia.com/embed/medias/${video.wistiaId}/swatch" class="absolute inset-0 w-full h-full object-cover opacity-90 group-active:opacity-100 transition">
                                    <div class="absolute inset-0 flex items-center justify-center"><div class="w-14 h-14 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white shadow-xl"><i class="fas fa-play text-xl ml-1"></i></div></div>
                                </div>
                                <div class="p-4 flex justify-between items-center pb-2">
                                    <div>
                                        <h4 class="font-bold text-slate-800 text-sm leading-tight mb-1">${video.title}</h4>
                                        <p class="text-[11px] text-slate-500 font-bold uppercase tracking-wide"><i class="fas fa-chalkboard-teacher mr-1"></i>Class ${video.targetClass}</p>
                                    </div>
                                </div>
                                ${actionButtonsHtml}
                            </div>`;
                    } else {
                        // 🔒 LOCKED VIDEO UI (PW Style Paywall)
                        let lockedButtonsHtml = "";
                        if (video.notesUrl || video.testUrl) {
                            lockedButtonsHtml = `<div class="px-4 pb-4 flex gap-2 border-t border-slate-50 pt-3 mt-1">`;
                            if (video.notesUrl) lockedButtonsHtml += `<button onclick="buyCourse('${safeCourseName}', 499)" class="flex-1 bg-slate-50 text-slate-400 text-[11px] font-bold py-2 rounded-xl flex justify-center items-center gap-1.5 active:scale-95 transition"><i class="fas fa-lock"></i> Class Notes</button>`;
                            if (video.testUrl) lockedButtonsHtml += `<button onclick="buyCourse('${safeCourseName}', 499)" class="flex-1 bg-slate-50 text-slate-400 text-[11px] font-bold py-2 rounded-xl flex justify-center items-center gap-1.5 active:scale-95 transition"><i class="fas fa-lock"></i> DPP / Test</button>`;
                            lockedButtonsHtml += `</div>`;
                        }

                        videoContainer.innerHTML += `
                            <div class="bg-white rounded-[20px] shadow-sm border border-slate-100 overflow-hidden mb-5">
                                <div onclick="buyCourse('${safeCourseName}', 499)" class="w-full relative bg-slate-900 cursor-pointer group" style="aspect-ratio: 16/9;">
                                    <img src="https://fast.wistia.com/embed/medias/${video.wistiaId}/swatch" class="absolute inset-0 w-full h-full object-cover opacity-40 grayscale group-active:opacity-50 transition">
                                    <div class="absolute inset-0 flex flex-col items-center justify-center text-white">
                                        <div class="w-14 h-14 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white shadow-xl mb-2"><i class="fas fa-lock text-xl"></i></div>
                                        <span class="text-[10px] font-bold bg-[#5a4bda] px-3 py-1 rounded shadow-md tracking-wider">UNLOCK PREMIUM</span>
                                    </div>
                                </div>
                                <div class="p-4 flex justify-between items-center pb-2">
                                    <div>
                                        <h4 class="font-bold text-slate-800 text-sm leading-tight mb-1">${video.title}</h4>
                                        <p class="text-[11px] text-slate-500 font-bold uppercase tracking-wide"><i class="fas fa-chalkboard-teacher mr-1"></i>Class ${video.targetClass}</p>
                                    </div>
                                </div>
                                ${lockedButtonsHtml}
                            </div>`;
                    }
                });
            });
        });
    });

    // Wistia Player Logic
    window.startVideo = function (wistiaId, title) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('videoModal').classList.remove('hidden'); document.getElementById('videoModal').classList.add('flex');
        document.body.style.overflow = 'hidden';
        document.getElementById('modalPlayerContainer').innerHTML = `<div class="wistia_embed wistia_async_${wistiaId} seo=false videoFoam=false autoPlay=true playsinline=true" style="height:100%;width:100%;position:relative;"></div>`;
    };
    window.closeVideo = function () {
        document.getElementById('videoModal').classList.add('hidden'); document.getElementById('videoModal').classList.remove('flex');
        document.getElementById('modalPlayerContainer').innerHTML = ""; document.body.style.overflow = '';
    };

    // Razorpay Logic inside Lectures
    window.buyCourse = function(courseName, price) {
        const options = {
            "key": RZP_KEY, "amount": price * 100, "currency": "INR", "name": "AstraCampus Premium", "description": "Unlock: " + courseName,
            "handler": async function (response) {
                try {
                    await updateDoc(doc(db, "users", currentUserId), { purchasedCourses: arrayUnion(courseName) });
                    document.getElementById('successModal').classList.remove('hidden'); document.getElementById('successModal').classList.add('flex');
                    setTimeout(() => document.getElementById('successCard').classList.add('success-zoom'), 50);
                } catch (err) { alert("Error: " + err.message); }
            },
            "prefill": { "name": currentUserData.name, "email": currentUserData.email, "contact": currentUserData.phone }, "theme": { "color": "#5a4bda" }
        };
        const rzp = new Razorpay(options); rzp.open();
    };

    window.closeSuccessModal = function() {
        document.getElementById('successCard').classList.remove('success-zoom');
        setTimeout(() => { document.getElementById('successModal').classList.add('hidden'); document.getElementById('successModal').classList.remove('flex'); }, 200);
    };
</script>
</body>
</html>
