<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen pb-24">

<div class="max-w-md mx-auto relative h-full">

    <div class="bg-blue-600 text-white p-4 rounded-b-3xl shadow-md sticky top-0 z-50">
        <div class="flex justify-between items-center mb-2">
            <button onclick="window.location.href='dashboard.html'" class="hover:bg-white/20 p-2 rounded-xl transition">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="text-lg font-bold">Attendance Record</h1>
            <div class="w-8"></div>
        </div>
    </div>

    <div class="px-4 mt-6">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-6">
            <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-2">Overall Summary</p>
            <div class="flex items-end gap-2 mb-4">
                <h2 class="text-4xl font-black text-blue-600" id="attPercentage">0%</h2>
                <p class="text-xs font-bold text-gray-500 mb-1.5 uppercase">Accuracy</p>
            </div>
            
            <div class="w-full bg-gray-100 rounded-full h-2 mb-5">
                <div id="attProgressBar" class="bg-blue-500 h-2 rounded-full transition-all duration-1000" style="width: 0%"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-green-50 p-4 rounded-2xl border border-green-100 flex flex-col justify-center">
                    <p class="text-[10px] font-bold text-green-600 uppercase mb-1">Total Present</p>
                    <p class="text-2xl font-black text-green-700" id="presentCount">0</p>
                </div>
                <div class="bg-red-50 p-4 rounded-2xl border border-red-100 flex flex-col justify-center">
                    <p class="text-[10px] font-bold text-red-600 uppercase mb-1">Total Absent</p>
                    <p class="text-2xl font-black text-red-700" id="absentCount">0</p>
                </div>
            </div>
        </div>

        <h3 class="text-sm font-bold text-gray-800 mb-3"><i class="fas fa-calendar-check text-blue-500 mr-2"></i>Daily Log</h3>
        
        <div id="attendanceList" class="space-y-3">
            <div class="text-center py-10">
                <i class="fas fa-spinner fa-spin text-3xl text-blue-500 mb-2"></i>
                <p class="text-sm text-gray-500 font-medium">Fetching records...</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { doc, getDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if(userDoc.exists()) {
                const schoolId = userDoc.data().schoolId;

                // FILTER BY SCHOOL & EMAIL
                const q = query(
                    collection(db, "attendance"), 
                    where("studentEmail", "==", user.email),
                    where("schoolId", "==", schoolId)
                );
                
                onSnapshot(q, (snapshot) => {
                    let present = 0, absent = 0;
                    let records = [];
                    const list = document.getElementById('attendanceList');
                    list.innerHTML = "";

                    if(snapshot.empty) {
                        list.innerHTML = `<div class="bg-white p-6 rounded-2xl text-center border border-gray-100 shadow-sm"><p class="text-sm text-gray-400 font-medium">No attendance records found yet.</p></div>`;
                        return;
                    }

                    snapshot.forEach((docSnap) => records.push(docSnap.data()));
                    records.sort((a, b) => new Date(b.date) - new Date(a.date)); 

                    records.forEach((data) => {
                        if(data.status === "present") present++; else absent++;
                        
                        const dateObj = new Date(data.date);
                        const formattedDate = dateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

                        const bgClass = data.status === 'present' ? 'bg-green-50 text-green-700 border-green-100' : 'bg-red-50 text-red-700 border-red-100';
                        const icon = data.status === 'present' ? '<i class="fas fa-check"></i>' : '<i class="fas fa-times"></i>';
                        
                        list.innerHTML += `
                            <div class="flex justify-between items-center p-4 border border-gray-100 bg-white shadow-sm rounded-2xl mb-2">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full flex justify-center items-center font-bold border ${bgClass}">
                                        ${icon}
                                    </div>
                                    <span class="text-sm font-bold text-gray-800">${formattedDate}</span>
                                </div>
                                <span class="px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wide ${bgClass}">
                                    ${data.status}
                                </span>
                            </div>
                        `;
                    });

                    const total = present + absent;
                    const percentage = total === 0 ? 0 : Math.round((present / total) * 100);

                    document.getElementById('presentCount').innerText = present;
                    document.getElementById('absentCount').innerText = absent;
                    document.getElementById('attPercentage').innerText = percentage + "%";
                    
                    setTimeout(() => {
                        document.getElementById('attProgressBar').style.width = percentage + "%";
                        if(percentage < 50) document.getElementById('attProgressBar').classList.replace('bg-blue-500', 'bg-red-500');
                        else if(percentage >= 75) document.getElementById('attProgressBar').classList.replace('bg-blue-500', 'bg-green-500');
                    }, 300);
                });
            }
        } else {
            window.location.href = "../index.html";
        }
    });
</script>
</body>
</html>
