<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Record - AstraCampus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="pb-10">

<div class="bg-blue-600 text-white px-5 py-5 rounded-b-[24px] shadow-md flex items-center gap-4 sticky top-0 z-50">
    <button onclick="window.history.back()" class="text-white hover:text-blue-100 transition text-lg active:scale-95">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-lg font-bold">Attendance Record</h1>
</div>

<div class="max-w-md mx-auto px-5 mt-6">

    <div class="bg-white rounded-2xl shadow-[0_4px_20px_-2px_rgba(0,0,0,0.03)] border border-slate-100 p-6 mb-6">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Overall Summary</p>
        <div class="flex items-baseline gap-2 mb-4">
            <h2 class="text-4xl font-black text-blue-600" id="attPercentage">0%</h2>
            <span class="text-[11px] font-bold text-slate-500 tracking-wide uppercase">Attendance</span>
        </div>
        
        <div class="w-full bg-slate-100 h-2.5 rounded-full mb-6 overflow-hidden">
            <div id="attProgressBar" class="bg-blue-600 h-full rounded-full transition-all duration-700 ease-out" style="width: 0%;"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-emerald-50/50 rounded-[16px] p-4 border border-emerald-100">
                <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-wide mb-1">Total Present</p>
                <h3 class="text-2xl font-black text-emerald-600" id="totalPresent">0</h3>
            </div>
            <div class="bg-red-50/50 rounded-[16px] p-4 border border-red-100">
                <p class="text-[10px] font-bold text-red-500 uppercase tracking-wide mb-1">Total Absent</p>
                <h3 class="text-2xl font-black text-red-500" id="totalAbsent">0</h3>
            </div>
        </div>
    </div>

    <h3 class="font-bold text-slate-800 mb-3 flex items-center gap-2 text-sm px-1">
        <i class="fas fa-calendar-day text-blue-500"></i> Daily Log
    </h3>
    
    <div id="dailyLogContainer" class="space-y-3">
        <div class="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center">
            <p class="text-sm text-slate-400 font-medium">Loading records...</p>
        </div>
    </div>

</div>

<script type="module">
    import { auth, db } from '../js/firebase-init.js';
    import { collection, query, where, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const attPercentage = document.getElementById('attPercentage');
    const attProgressBar = document.getElementById('attProgressBar');
    const totalPresentEl = document.getElementById('totalPresent');
    const totalAbsentEl = document.getElementById('totalAbsent');
    const dailyLogContainer = document.getElementById('dailyLogContainer');

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const schoolId = userDoc.data().schoolId;

                // SMART FILTER 🔥 (Firebase Index Error se bachne ke liye aur ID/Email dono check karne ke liye)
                const attQuery = query(collection(db, "attendance"), where("schoolId", "==", schoolId));
                
                onSnapshot(attQuery, (snapshot) => {
                    let presentCount = 0;
                    let absentCount = 0;
                    let studentRecords = [];

                    snapshot.forEach(docSnap => {
                        const data = docSnap.data();
                        
                        // Yahan wo pakad lega bacche ka data, chahe purana ho ya naya!
                        if(data.studentId === user.uid || data.studentEmail === user.email) {
                            studentRecords.push(data);
                            if(data.status === 'present') presentCount++;
                            else if(data.status === 'absent') absentCount++;
                        }
                    });

                    let totalCount = presentCount + absentCount;
                    let percentage = totalCount === 0 ? 0 : Math.round((presentCount / totalCount) * 100);

                    // 1. Update Top Summary
                    attPercentage.innerText = percentage + "%";
                    attProgressBar.style.width = percentage + "%";
                    totalPresentEl.innerText = presentCount;
                    totalAbsentEl.innerText = absentCount;

                    // 2. Client-Side Sorting (Latest Date Upar)
                    studentRecords.sort((a, b) => {
                        const dateA = a.date ? new Date(a.date) : new Date(0);
                        const dateB = b.date ? new Date(b.date) : new Date(0);
                        return dateB - dateA;
                    });

                    // 3. Render Daily List
                    if(studentRecords.length === 0) {
                        dailyLogContainer.innerHTML = `
                            <div class="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center">
                                <p class="text-sm text-slate-400 font-medium">No attendance records found yet.</p>
                            </div>
                        `;
                    } else {
                        dailyLogContainer.innerHTML = "";
                        studentRecords.forEach(record => {
                            const isPresent = record.status === 'present';
                            
                            // Colors based on status
                            const statusColor = isPresent ? 'text-emerald-600 bg-emerald-50 border-emerald-100' : 'text-red-500 bg-red-50 border-red-100';
                            const iconColor = isPresent ? 'text-emerald-500' : 'text-red-500';
                            const statusIcon = isPresent ? 'fa-check' : 'fa-times';
                            const statusText = isPresent ? 'Present' : 'Absent';
                            
                            // Format Date to looking nice (e.g. "12 Oct 2023")
                            const dateObj = new Date(record.date);
                            const dateString = dateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

                            dailyLogContainer.innerHTML += `
                                <div class="bg-white p-4 rounded-[20px] shadow-[0_2px_10px_-2px_rgba(0,0,0,0.02)] border border-slate-100 flex justify-between items-center transition hover:border-slate-200">
                                    <div class="flex items-center gap-3.5">
                                        <div class="w-10 h-10 rounded-[14px] flex items-center justify-center ${statusColor} border shrink-0">
                                            <i class="fas ${statusIcon} ${iconColor}"></i>
                                        </div>
                                        <div>
                                            <p class="font-bold text-slate-800 text-sm">${dateString}</p>
                                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wide mt-0.5">Daily Record</p>
                                        </div>
                                    </div>
                                    <span class="text-[10px] font-bold px-3 py-1.5 rounded-lg ${statusColor} uppercase tracking-wider">
                                        ${statusText}
                                    </span>
                                </div>
                            `;
                        });
                    }
                });
            }
        } else {
            window.location.href = "../index.html";
        }
    });
</script>
</body>
</html>
