<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Action Successful - AstraCampus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
      body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8 text-center border border-slate-100">
    
    <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-500 text-4xl mx-auto mb-6 shadow-sm border-4 border-white outline outline-4 outline-emerald-50">
        <i class="fas fa-check-circle"></i>
    </div>
    
    <h1 class="text-2xl font-bold text-slate-800 mb-2">
      Action Successful!
    </h1>

    <p class="text-slate-500 mb-8 text-sm leading-relaxed">
      Your account password has been updated successfully. You can now return to the login page and access your dashboard.
    </p>

    <button
      onclick="window.location.href='../index.html'"
      class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 rounded-xl font-bold transition shadow-lg shadow-indigo-200 flex items-center justify-center gap-2"
    >
      <i class="fas fa-arrow-right-to-bracket"></i> Go to Login
    </button>

  </div>

</body>
</html>
